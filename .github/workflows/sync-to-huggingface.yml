name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: JoeMusk8/us-stock-decision-system
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
      - name: Wait for Space build
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --quiet --upgrade huggingface_hub
          if ! hf spaces wait JoeMusk8/us-stock-decision-system --timeout 3m --token "$HF_TOKEN"; then
            hf spaces logs JoeMusk8/us-stock-decision-system --tail 120 --token "$HF_TOKEN" || true
            hf spaces logs JoeMusk8/us-stock-decision-system --build --tail 120 --token "$HF_TOKEN"
            exit 1
          fi
