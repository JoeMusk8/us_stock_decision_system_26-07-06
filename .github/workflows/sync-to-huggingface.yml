name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: JoeMusk8/us-stock-decision-system
          hf_token: ${{ secrets.HF_TOKEN }}
          repo_type: space
          space_sdk: docker
      - name: Restart and verify Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -m pip install --quiet --upgrade huggingface_hub
          hf spaces restart JoeMusk8/us-stock-decision-system --factory-reboot --token "$HF_TOKEN"
          if ! hf spaces wait JoeMusk8/us-stock-decision-system --timeout 15m --token "$HF_TOKEN"; then
            if curl --fail --silent --show-error --max-time 30 \
              https://joemusk8-us-stock-decision-system.hf.space/api/health/providers > /dev/null; then
              echo "Space health endpoint is responding despite delayed runtime status."
              exit 0
            fi
            hf spaces logs JoeMusk8/us-stock-decision-system --tail 120 --token "$HF_TOKEN" || true
            hf spaces logs JoeMusk8/us-stock-decision-system --build --tail 120 --token "$HF_TOKEN"
            exit 1
          fi
